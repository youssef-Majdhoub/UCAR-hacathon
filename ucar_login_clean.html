<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCAR — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;
    font-family: 'Sora', sans-serif;
    background: #f1f4f8;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .shell {
    display: flex;
    width: 1000px;
    height: 600px;
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.08);
  }

  /* ───── PHOTO SIDE ───── */
  .photo-side {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .photo-side img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    filter: brightness(0.82);
  }
  .photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(13, 46, 110, 0.55) 0%,
      rgba(10, 25, 60, 0.30) 100%
    );
  }
  .photo-brand {
    position: absolute;
    bottom: 36px; left: 36px;
  }
  .photo-brand-name {
    font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.9);
    letter-spacing: 0.3px;
  }
  .photo-brand-sub {
    font-size: 12px; color: rgba(255,255,255,0.5);
    margin-top: 3px;
  }

  /* ───── FORM SIDE ───── */
  .form-side {
    width: 420px;
    flex-shrink: 0;
    background: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 52px 50px;
    position: relative;
  }

  /* thin top accent */
  .form-side::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #0d2e6e, #2456c8, #1a8fe3);
  }

  .logo-wrap {
    margin-bottom: 32px;
  }
  .logo-wrap img {
    height: 46px;
    display: block;
    object-fit: contain;
    object-position: left;
  }

  .form-label {
    font-size: 22px;
    font-weight: 700;
    color: #0d1f4e;
    margin-bottom: 6px;
    letter-spacing: -0.4px;
  }
  .form-sub {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 36px;
    font-weight: 400;
  }

  .field {
    margin-bottom: 18px;
  }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #374151;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .field input {
    width: 100%;
    height: 48px;
    padding: 0 16px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Sora', sans-serif;
    color: #0f172a;
    background: #f8fafc;
    outline: none;
    transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
  }
  .field input::placeholder { color: #b0bac8; }
  .field input:focus {
    border-color: #2456c8;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(36, 86, 200, 0.10);
  }

  .btn-login {
    margin-top: 10px;
    width: 100%;
    height: 50px;
    background: #0d2e6e;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Sora', sans-serif;
    letter-spacing: 0.2px;
    cursor: pointer;
    transition: background 0.18s, transform 0.12s;
    position: relative;
    overflow: hidden;
  }
  .btn-login:hover  { background: #1a3f8f; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(0); }

  .footer-note {
    margin-top: 28px;
    font-size: 11.5px;
    color: #cbd5e1;
    text-align: center;
    line-height: 1.6;
  }
  .footer-note a {
    color: #94a3b8;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
</style>
</head>
